            if (normalizedStrength <= 0.02) return false;

            const baseScale = levelGrowAnimation
                ? Math.max(getPlayfieldScale(now), levelGrowAnimation.toScale)
                : getPlayfieldScale(now);
            const expansion = wallKnockMinExpandFraction + ((wallKnockMaxExpandFraction - wallKnockMinExpandFraction) * normalizedStrength);
            const durationMs = wallKnockMinDurationMs + ((wallKnockMaxDurationMs - wallKnockMinDurationMs) * normalizedStrength);
            const targetScale = baseScale + expansion;
            const clampedTargetScale = Math.max(0, Math.min(1, targetScale));
            const overshootAmount = 0.0015 + (normalizedStrength * 0.0035);
            const overshootScale = targetScale >= 1
                ? 1 + (0.0025 + (normalizedStrength * 0.005))
                : Math.min(1, clampedTargetScale + overshootAmount);
            const settleDurationMs = 110 + (normalizedStrength * 65);

            return startPlayfieldGrowAnimation(
                now,
                clampedTargetScale,
                durationMs,
                {
                    overshootScale,
                    settleDurationMs,
                    source: 'wall_knock'
                }
            );
        }

        function updateLevelGrowAnimation(now) {
            if (!levelGrowAnimation) return false;

            const growDurationMs = Math.max(1, levelGrowAnimation.durationMs || levelGrowDurationMs);
            const overshootScale = levelGrowAnimation.overshootScale;
            const settleDurationMs = overshootScale === null
                ? 0
                : Math.max(1, levelGrowAnimation.settleDurationMs || 1);
            const elapsed = Math.max(0, now - levelGrowAnimation.startedAt);
            const totalDurationMs = growDurationMs + settleDurationMs;
            let currentScale;

            if (overshootScale !== null) {
                if (elapsed < growDurationMs) {
                    const progress = elapsed / growDurationMs;
                    const easedProgress = easeOutCubic(progress);
                    currentScale = levelGrowAnimation.fromScale + ((overshootScale - levelGrowAnimation.fromScale) * easedProgress);
                } else {
                    const settleProgress = Math.min(1, (elapsed - growDurationMs) / settleDurationMs);
                    const easedSettleProgress = easeOutCubic(settleProgress);
                    currentScale = overshootScale + ((levelGrowAnimation.toScale - overshootScale) * easedSettleProgress);
                }
            } else {
                const progress = Math.min(1, elapsed / growDurationMs);
                const easedProgress = easeOutCubic(progress);
                currentScale = levelGrowAnimation.fromScale + ((levelGrowAnimation.toScale - levelGrowAnimation.fromScale) * easedProgress);
            }

            const lastScale = playfieldScale;
            const scaleRatio = lastScale > 0 ? currentScale / lastScale : 1;
            applyPlayfieldScaleRatio(scaleRatio);
            playfieldScale = currentScale;
            lastPlayfieldScaleUpdateAt = now;

            if (elapsed >= totalDurationMs) {
                const finalScale = levelGrowAnimation.toScale;
                levelGrowAnimation = null;
                playfieldScale = finalScale;
                updatePlayfieldFrame(now);
                return false;
            }

            updatePlayfieldFrame(now);
            return true;
        }

        function updateIdleCycle(now) {
            if (!isPlaying || isPaused || levelGrowAnimation) {
                lastPlayfieldScaleUpdateAt = now;
                return;
            }

            if (now < shrinkPausedUntil) {
                lastPlayfieldScaleUpdateAt = now;
                return;
            }

            const elapsed = Math.max(0, now - lastPlayfieldScaleUpdateAt);
            lastPlayfieldScaleUpdateAt = now;
            if (elapsed <= 0 || playfieldScale <= 0) return;

            const nextScale = Math.max(0, playfieldScale - (elapsed * getContinuousPlayfieldShrinkPerMs()));
            if (Math.abs(nextScale - playfieldScale) <= 0.000001) return;

            const scaleRatio = playfieldScale > 0 ? nextScale / playfieldScale : 1;
            applyPlayfieldScaleRatio(scaleRatio);
            playfieldScale = nextScale;
            updatePlayfieldFrame(now);

            if (playfieldScale <= 0.0005) {
                playfieldScale = 0;
                finishRound();
            }
        }

        function getBallFriction() {
            let friction;
            if (level <= 9) {
                friction = Math.min(levelOneBallFriction + (level - 1) * levelFrictionStep, earlyMaxBallFriction);
            } else {
                friction = Math.min(earlyMaxBallFriction + (level - 9) * lateLevelBallFrictionStep, maxBallFriction);
            }

            if (shouldUseKeyboardPrompt()) {
                friction = Math.min(friction + desktopBallFrictionBonus, maxBallFriction);
            }

            if (!levelGrowAnimation && playfieldScale < 0.999) {
                friction = 1 - ((1 - friction) * (1 - shrinkSlipperinessBonus));
            }

            return friction;
        }

        function getContinuousPlayfieldShrinkPerMs() {
            if (level < 3) {
                return 0;
            }

            const extraLevels = Math.max(0, level - 3);
            return continuousPlayfieldShrinkPerMs * (1 + (extraLevels * playfieldShrinkSpeedPerLevelMultiplier));
        }

        function getDesktopMouseAccelerationStrength() {
            const rampLevels = Math.max(0, level - desktopAccelerationRampStartLevel + 1);
            const multiplier = Math.min(
                1 + (rampLevels * desktopAccelerationStep),
                desktopAccelerationMaxMultiplier
            );
            return mouseAccelerationStrength * multiplier;
        }

        function getBlockCountForLevel(targetLevel) {
            return Math.min(targetLevel, maxBlockCount);
        }

        function getBlockSize() {
            return blockSize;
        }

        function shouldHighlightCurrentLevel() {
            return !currentRunIsPreview && bestScoreBeforeRun > 0 && level > bestScoreBeforeRun;
        }

        function updateBestScoreDisplayState() {
            const highlightNewBest = shouldHighlightCurrentLevel();
            const shouldShowBestScore =
                !currentRunIsPreview &&
                (isPlaying || isFalling || isShowingGameOver) &&
                (bestScore > 1 || highlightNewBest);

            bestScoreDisplay.classList.toggle('game-over', isShowingGameOver);
            bestScoreDisplay.classList.toggle('new-high-score', highlightNewBest);
            bestScoreDisplay.style.display = shouldShowBestScore ? 'block' : 'none';

            if (shouldShowBestScore) {
                bestScoreDisplay.innerText = highlightNewBest ? 'New Best' : `Best: ${bestScore}`;
            }
        }

        function updateLevelIndicatorState() {
            const displayLevel = getDisplayLevel();
            levelIndicator.innerText = displayLevel;
            levelIndicator.style.display = isPlaying || isFalling || isShowingGameOver ? 'block' : 'none';
            levelIndicator.classList.toggle('game-over', isShowingGameOver);
            levelIndicator.classList.toggle('new-best', shouldHighlightCurrentLevel());
            levelIndicator.classList.toggle('milestone', isMilestoneLevel(displayLevel));
            applyThemeForLevel(displayLevel);
            updateBestScoreDisplayState();
            updateAchievementSummaryState();
            updateOverlayTextLayout();
        }

        function clearPendingLevelAdvance() {
            if (levelAdvanceTimeoutId !== null) {
                clearTimeout(levelAdvanceTimeoutId);
                levelAdvanceTimeoutId = null;
            }
        }

        function clampValue(value, limit) {
            return Math.max(-limit, Math.min(limit, value));
        }

        function clampDominoMotion(domino) {
            domino.vx = clampValue(domino.vx, maxBlockSpeed);
            domino.vy = clampValue(domino.vy, maxBlockSpeed);
            domino.angularVelocity = clampValue(domino.angularVelocity, maxAngularVelocity);
        }

        function markDominoKnocked(domino, now) {
            if (domino.knocked) return;
            domino.knocked = true;
            domino.knockedAt = now;
            domino.removeAt = now + knockedBlockLifetimeMs;
            domino.element.classList.add('knocked');
            domino.element.style.opacity = '1';
        }

        function isDominoSolid(domino, now) {
            return domino.removeAt === null || now < domino.removeAt;
        }

        function getDominoScale(domino, now) {
            if (!domino.knocked || domino.knockedAt === null) return 1;
            return Math.max(0, 1 - Math.min(1, (now - domino.knockedAt) / knockedBlockLifetimeMs));
        }

        function getBallVisualScale(now = performance.now()) {
            return ballScale * getPlayfieldScale(now);
        }

        function getBallRadius(now = performance.now()) {
            return radius * getBallVisualScale(now);
        }

        function getDominoGeometry(domino, now) {
            const scale = getDominoScale(domino, now) * getPlayfieldScale(now);
            const width = domino.width * scale;
            const height = domino.height * scale;
            const centerX = domino.x + (domino.width / 2);
            const centerY = domino.y + (domino.height / 2);

            if (width <= 0 || height <= 0) {
                return {
                    scale,
                    width,
                    height,
                    centerX,
                    centerY,
                    halfWidth: 0,
                    halfHeight: 0,
                    axisXx: 1,
                    axisXy: 0,
                    axisYx: 0,
                    axisYy: 1,
                    minX: centerX,
                    maxX: centerX,
                    minY: centerY,
                    maxY: centerY
                };
            }

            const halfWidth = width / 2;
            const halfHeight = height / 2;
            const angleRadians = domino.angle * (Math.PI / 180);
            const axisXx = Math.cos(angleRadians);
            const axisXy = Math.sin(angleRadians);
            const axisYx = -axisXy;
            const axisYy = axisXx;
            const extentX = Math.abs(axisXx * halfWidth) + Math.abs(axisYx * halfHeight);
            const extentY = Math.abs(axisXy * halfWidth) + Math.abs(axisYy * halfHeight);

            return {
                scale,
                width,
                height,
                centerX,
                centerY,
                halfWidth,
                halfHeight,
                axisXx,
                axisXy,
                axisYx,
                axisYy,
                minX: centerX - extentX,
                maxX: centerX + extentX,
                minY: centerY - extentY,
                maxY: centerY + extentY
            };
        }

        function getDominoHitRect(domino, now) {
            const geometry = getDominoGeometry(domino, now);
            return {
                x: geometry.minX,
                y: geometry.minY,
                width: geometry.maxX - geometry.minX,
                height: geometry.maxY - geometry.minY,
                shapeWidth: geometry.width,
                shapeHeight: geometry.height,
                centerX: geometry.centerX,
                centerY: geometry.centerY
            };
        }

        function projectDominoGeometryOntoAxis(geometry, axisX, axisY) {
            const centerProjection = (geometry.centerX * axisX) + (geometry.centerY * axisY);
            const projectionRadius =
                (geometry.halfWidth * Math.abs((geometry.axisXx * axisX) + (geometry.axisXy * axisY))) +
                (geometry.halfHeight * Math.abs((geometry.axisYx * axisX) + (geometry.axisYy * axisY)));

            return {
                min: centerProjection - projectionRadius,
                max: centerProjection + projectionRadius
            };
        }

        function getBallDominoCollision(domino, now, ballX, ballY, ballRadius) {
            const geometry = getDominoGeometry(domino, now);
            if (geometry.width <= 0 || geometry.height <= 0 || ballRadius <= 0) return null;

            const offsetX = ballX - geometry.centerX;
            const offsetY = ballY - geometry.centerY;
            const localX = (offsetX * geometry.axisXx) + (offsetY * geometry.axisXy);
            const localY = (offsetX * geometry.axisYx) + (offsetY * geometry.axisYy);

            let contactLocalX = clampValue(localX, geometry.halfWidth);
            let contactLocalY = clampValue(localY, geometry.halfHeight);
            let deltaLocalX = localX - contactLocalX;
            let deltaLocalY = localY - contactLocalY;
            let distance = Math.hypot(deltaLocalX, deltaLocalY);
            let overlap = ballRadius - distance;
            let normalLocalX;
            let normalLocalY;

            if (distance > 0.0001) {
                normalLocalX = deltaLocalX / distance;
                normalLocalY = deltaLocalY / distance;
            } else {
                const distanceToVerticalEdge = geometry.halfWidth - Math.abs(localX);
                const distanceToHorizontalEdge = geometry.halfHeight - Math.abs(localY);

                if (distanceToVerticalEdge < distanceToHorizontalEdge) {
                    normalLocalX = localX >= 0 ? 1 : -1;
                    normalLocalY = 0;
                    contactLocalX = normalLocalX * geometry.halfWidth;
                    contactLocalY = clampValue(localY, geometry.halfHeight);
                    overlap = ballRadius + distanceToVerticalEdge;
                } else {
                    normalLocalX = 0;
                    normalLocalY = localY >= 0 ? 1 : -1;
                    contactLocalX = clampValue(localX, geometry.halfWidth);
                    contactLocalY = normalLocalY * geometry.halfHeight;
                    overlap = ballRadius + distanceToHorizontalEdge;
                }
            }

            if (overlap <= 0) return null;

            const normalX = (normalLocalX * geometry.axisXx) + (normalLocalY * geometry.axisYx);
            const normalY = (normalLocalX * geometry.axisXy) + (normalLocalY * geometry.axisYy);
            const contactX = geometry.centerX + (contactLocalX * geometry.axisXx) + (contactLocalY * geometry.axisYx);
            const contactY = geometry.centerY + (contactLocalX * geometry.axisXy) + (contactLocalY * geometry.axisYy);

            return {
                overlap,
                contactX,
                contactY,
                normalX,
                normalY,
                centerX: geometry.centerX,
                centerY: geometry.centerY
            };
        }

        function getDominoDominoCollision(first, second, now) {
            const firstGeometry = getDominoGeometry(first, now);
            const secondGeometry = getDominoGeometry(second, now);
            if (firstGeometry.width <= 0 || firstGeometry.height <= 0 || secondGeometry.width <= 0 || secondGeometry.height <= 0) {
                return null;
            }

            const axes = [
                [firstGeometry.axisXx, firstGeometry.axisXy],
                [firstGeometry.axisYx, firstGeometry.axisYy],
                [secondGeometry.axisXx, secondGeometry.axisXy],
                [secondGeometry.axisYx, secondGeometry.axisYy]
            ];
            const centerDeltaX = secondGeometry.centerX - firstGeometry.centerX;
            const centerDeltaY = secondGeometry.centerY - firstGeometry.centerY;
            let minimumOverlap = Infinity;
            let normalX = 0;
            let normalY = 0;

            for (const [axisX, axisY] of axes) {
                const firstProjection = projectDominoGeometryOntoAxis(firstGeometry, axisX, axisY);
                const secondProjection = projectDominoGeometryOntoAxis(secondGeometry, axisX, axisY);
                const overlap = Math.min(firstProjection.max, secondProjection.max) - Math.max(firstProjection.min, secondProjection.min);

                if (overlap <= 0) {
                    return null;
                }

                if (overlap < minimumOverlap) {
                    const axisDirection = ((centerDeltaX * axisX) + (centerDeltaY * axisY)) < 0 ? -1 : 1;
                    minimumOverlap = overlap;
                    normalX = axisX * axisDirection;
                    normalY = axisY * axisDirection;
                }
            }

            return {
                overlap: minimumOverlap,
                normalX,
                normalY
            };
        }

        function resetInputState() {
            baselineX = null;
            baselineY = null;
            baselineBeta = null;
            baselineGamma = null;
            latestOrientationBeta = null;
            latestOrientationGamma = null;
            motionSampleCount = 0;
            orientationSampleCount = 0;
            activeInputMode = 'none';
            pointerControlActive = false;
            pointerControlId = null;
            mouseOriginCaptured = false;
            pointerAnchorX = 0;
            pointerAnchorY = 0;
            hideMouseOriginCrosshair();
            ax = 0;
            ay = 0;
        }

        function resetDesktopMouseOrigin() {
            if (!shouldUseKeyboardPrompt()) return;
            mouseOriginCaptured = false;
            pointerControlActive = false;
            pointerControlId = null;
            pointerAnchorX = 0;
            pointerAnchorY = 0;
            ax = 0;
            ay = 0;
            hideMouseOriginCrosshair();
        }

        function resetMobileControlOrigin() {
            if (shouldUseKeyboardPrompt()) return;
            baselineX = null;
            baselineY = null;
            baselineBeta = null;
            baselineGamma = null;
            latestOrientationBeta = null;
            latestOrientationGamma = null;
            motionSampleCount = 0;
            orientationSampleCount = 0;
            activeInputMode = 'none';
            pointerControlActive = false;
            pointerControlId = null;
            pointerAnchorX = 0;
            pointerAnchorY = 0;
            ax = 0;
            ay = 0;
        }

        function handleWindowBlur() {
            if (!shouldUseKeyboardPrompt() || !isPlaying || isPaused) return;
            wasAutoPausedOnBlur = true;
            isPaused = true;
            beginGameplayPause(performance.now());
            applyPauseState();
        }

        function handleWindowFocus() {
            if (!shouldUseKeyboardPrompt() || !wasAutoPausedOnBlur || !isPlaying || !isPaused) return;
            wasAutoPausedOnBlur = false;
            resetDesktopMouseOrigin();
            resumeGameplayPause(performance.now());
            isPaused = false;
            applyPauseState();
        }

        function resetTrail() {
            trailHistory.length = 0;
            for (const node of trailNodes) {
                node.style.opacity = '0';
                node.style.transform = 'translate(-9999px, -9999px) scale(0.7)';
            }
        }

        function updateTrail(now = performance.now()) {
            if (!isPlaying && !isFalling) {
                resetTrail();
                return;
            }

            trailHistory.unshift({ x, y, scale: getBallVisualScale(now) });
            const maxTrailHistory = trailLength * trailHistoryStep;
            if (trailHistory.length > maxTrailHistory) {
                trailHistory.length = maxTrailHistory;
            }

            const speed = Math.hypot(vx, vy);
            const speedOpacity = Math.min(0.36 + speed / 18, 0.72);
            for (let i = 0; i < trailNodes.length; i++) {
                const node = trailNodes[i];
                const point = trailHistory[Math.min(i * trailHistoryStep, trailHistory.length - 1)];
                if (!point) {
                    node.style.opacity = '0';
                    continue;
                }

                const opacity = Math.max(0, speedOpacity * (1 - i / trailNodes.length) * (isFalling ? 0.7 : 1));
                const scale = Math.max(0.2, point.scale * (1 - i * 0.05));
                node.style.opacity = opacity.toFixed(3);
                node.style.transform = `translate(${point.x}px, ${point.y}px) scale(${scale})`;
            }
        }

        function clearParticles() {
            while (particles.length) {
                const particle = particles.pop();
                particle.element.remove();
            }
        }

        function getMultiplierWord(count) {
            switch (count) {
                case 2:
                    return 'Double';
                case 3:
                    return 'Triple';
                case 4:
                    return 'Quadruple';
                case 5:
                    return 'Quintuple';
                case 6:
                    return 'Sextuple';
                default:
                    return `${count}x`;
            }
        }

        function clearBallCallout() {
            activeBallCallout = null;
            ballCallout.style.opacity = '0';
            ballCallout.style.transform = 'translate(-9999px, -9999px)';
        }

        function queueBallCallout(text, now, durationMs = ballCalloutDurationMs, gapMs = 70) {
            const startAt = activeBallCallout
                ? Math.max(now, activeBallCallout.startedAt + activeBallCallout.durationMs + gapMs)
                : now;
            queuedBallCallout = {
                text,
                startAt,
                durationMs
            };
        }

        function maybeRegisterCombo(source, now) {
            const otherSource = source === 'domino' ? 'wall' : 'domino';
            const comboWindowMs = 1050;
            if (now - lastComboSourceAt[otherSource] > comboWindowMs) {
                lastComboSourceAt[source] = now;
                return;
            }
            if (now - lastComboAt < 260) {
                lastComboSourceAt[source] = now;
                return;
            }

            lastComboAt = now;
            lastComboSourceAt[source] = now;
            comboCalloutTotal++;
            queueBallCallout('Combo!', now, 760);
        }

        function showBallCallout(text, now, durationMs = ballCalloutDurationMs) {
            ballCallout.textContent = text;
            const calloutScale = Math.max(0.68, getPlayfieldScale(now));
            const offsetX = 40 * calloutScale;
            const offsetY = -30 * calloutScale;
            const scaledWidth = ballCallout.offsetWidth * calloutScale;
            const preferredRightX = x + offsetX;
            const calloutX = preferredRightX + scaledWidth > width - 24
                ? Math.max(24, x - offsetX - scaledWidth)
                : Math.max(24, Math.min(width - 24 - scaledWidth, preferredRightX));
            const calloutY = Math.max(24, Math.min(height - 24, y + offsetY));
            activeBallCallout = {
                text,
                startedAt: now,
                durationMs,
                x: calloutX,
                y: calloutY,
                scale: calloutScale
            };
            updateBallCallout(now);
        }

        function updateBallCallout(now = performance.now()) {
            if (!activeBallCallout) {
                if (queuedBallCallout && now >= queuedBallCallout.startAt) {
                    const nextCallout = queuedBallCallout;
                    queuedBallCallout = null;
                    showBallCallout(nextCallout.text, now, nextCallout.durationMs);
                }
                return;
            }

            const elapsed = now - activeBallCallout.startedAt;
            if (elapsed >= activeBallCallout.durationMs) {
                clearBallCallout();
                if (queuedBallCallout && now >= queuedBallCallout.startAt) {
                    const nextCallout = queuedBallCallout;
                    queuedBallCallout = null;
                    showBallCallout(nextCallout.text, now, nextCallout.durationMs);
                }
                return;
            }

            const fadeIn = Math.min(1, elapsed / 120);
            const fadeOut = Math.min(1, (activeBallCallout.durationMs - elapsed) / 220);
            const opacity = Math.min(fadeIn, fadeOut);

            ballCallout.style.opacity = opacity.toFixed(3);
            ballCallout.style.transform = `translate(${activeBallCallout.x}px, ${activeBallCallout.y}px) scale(${activeBallCallout.scale.toFixed(3)})`;
        }

        function registerDominoHit(domino, now) {
            if (!domino) return;
            if ((domino.lastHitAt ?? -Infinity) + dominoHitCooldownMs > now) return;

            domino.lastHitAt = now;
            domino.hitCount = (domino.hitCount || 0) + 1;
            if (domino.hitCount >= 2) {
                if (domino.hitCount === 2) {
                    doubleHitCalloutTotal++;
                }
                showBallCallout(`${getMultiplierWord(domino.hitCount)} hit!`, now, 820);
            }
        }

        function getWallKnockStrength(domino, hitRect, wallAxis) {
            if (!domino || !hitRect) return 0;

            const baseSize = Math.max(1, getBlockSize());
            const wallNormalSpeed = wallAxis === 'x'
                ? Math.abs(domino.vx)
                : Math.abs(domino.vy);
            const recentAcceleration = Math.max(0, domino.recentAcceleration || 0);
            const sizeFactor = Math.max(
                0.35,
                Math.min(1.25, Math.sqrt(Math.max(1, (hitRect.shapeWidth ?? hitRect.width) * (hitRect.shapeHeight ?? hitRect.height))) / baseSize)
            );
            const speedFactor = Math.max(0, Math.min(1, (wallNormalSpeed - 0.55) / 4.8));
            const accelerationFactor = Math.max(0, Math.min(1, recentAcceleration / 2.8));
            const combinedImpact = (speedFactor * 0.7) + (accelerationFactor * 0.3);

            return Math.max(0, Math.min(1, combinedImpact * sizeFactor));
        }

        function registerWallKnock(domino, hitRect, wallAxis, now) {
            if (!domino || !hitRect) return;
            if ((domino.lastWallCalloutAt ?? -Infinity) + 220 > now) return;

            const strength = getWallKnockStrength(domino, hitRect, wallAxis);
            if (strength < 0.015) return;

            domino.lastWallCalloutAt = now;
            shrinkPausedUntil = Math.max(shrinkPausedUntil, now + blockKnockShrinkPauseMs);
            wallKnockCalloutTotal++;
            showBallCallout('Wall knock!', now, 760);
            maybeRegisterCombo('wall', now);
            expandPlayfieldOnWallKnock(now, strength);
        }

        function registerDominoCallout(now, addedCount = 1) {
            if (addedCount <= 0) return;

            if (lastDominoCalloutAt + dominoCalloutChainWindowMs >= now) {
                dominoCalloutCount += addedCount;
            } else {
                dominoCalloutCount = addedCount;
            }

            dominoCalloutTotal += addedCount;
            if (dominoCalloutCount >= 2) {
                doubleDominoCalloutTotal++;
            }

            lastDominoCalloutAt = now;
            showBallCallout(
                dominoCalloutCount === 1 ? 'domino!' : `${getMultiplierWord(dominoCalloutCount)} domino!`,
                now,
                860
            );
            maybeRegisterCombo('domino', now);
        }

        function emitParticles(originX, originY, strength = 1) {
            const count = Math.max(3, Math.round(3 + strength * 4));
            for (let i = 0; i < count; i++) {
                if (particles.length > 64) {
                    const oldest = particles.shift();
                    oldest.element.remove();
                }

                const element = document.createElement('div');
                element.className = 'impactParticle';
                element.style.background = currentTheme.particleColors[i % currentTheme.particleColors.length];
                const size = 6 + Math.random() * 8 * strength;
                element.style.width = `${size}px`;
                element.style.height = `${size}px`;
                element.style.marginLeft = `${-size / 2}px`;
                element.style.marginTop = `${-size / 2}px`;
                particleContainer.appendChild(element);

                const angle = Math.random() * Math.PI * 2;
                const speed = 1.2 + Math.random() * 3.6 * strength;
                particles.push({
                    x: originX,
                    y: originY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.03 + Math.random() * 0.025,
                    element
                });
            }
        }

        function playNewBestCelebrationSound() {
            if (!audioCtx || isMuted) return;
            playSound(520, 0.028, 0.18, 'triangle');
            setTimeout(() => playSound(660, 0.03, 0.2, 'triangle'), 90);
            setTimeout(() => playSound(840, 0.034, 0.28, 'triangle'), 180);
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const particle = particles[i];
                particle.x += particle.vx;
                particle.y += particle.vy;
                particle.vx *= 0.97;
                particle.vy *= 0.97;
                particle.life -= particle.decay;

                if (particle.life <= 0) {
                    particle.element.remove();
                    particles.splice(i, 1);
                    continue;
                }

                particle.element.style.opacity = particle.life.toFixed(3);
                particle.element.style.transform = `translate(${particle.x}px, ${particle.y}px) scale(${0.6 + particle.life * 0.8})`;
            }
        }

        function clamp01(value) {
            return Math.max(0, Math.min(1, value));
        }

        function hasSolidDominoBetweenBallAndEdge(direction, now, bounds, corridorHalfWidth = getBallRadius(now) + 12) {
            for (const domino of dominoes) {
                if (!isDominoSolid(domino, now)) continue;

                const hitRect = getDominoHitRect(domino, now);
                const overlapsVerticalLane = hitRect.y < y + corridorHalfWidth && hitRect.y + hitRect.height > y - corridorHalfWidth;
                const overlapsHorizontalLane = hitRect.x < x + corridorHalfWidth && hitRect.x + hitRect.width > x - corridorHalfWidth;

                if (direction === 'top') {
                    if (overlapsHorizontalLane && hitRect.y + hitRect.height >= bounds.top && hitRect.y + hitRect.height <= y) {
                        return true;
                    }
                } else if (direction === 'right') {
                    if (overlapsVerticalLane && hitRect.x >= x && hitRect.x <= bounds.right) {
                        return true;
                    }
                } else if (direction === 'bottom') {
                    if (overlapsHorizontalLane && hitRect.y >= y && hitRect.y <= bounds.bottom) {
                        return true;
                    }
                } else if (direction === 'left') {
                    if (overlapsVerticalLane && hitRect.x + hitRect.width >= bounds.left && hitRect.x + hitRect.width <= x) {
                        return true;
                    }
                }
            }

            return false;
        }

        function getEdgeDangerState(now = performance.now()) {
            const bounds = getPlayfieldBounds(now);
            const ballRadius = getBallRadius(now);
            const distances = {
                top: Math.max(0, (y - ballRadius) - bounds.top),
                right: Math.max(0, bounds.right - (x + ballRadius)),
                bottom: Math.max(0, bounds.bottom - (y + ballRadius)),
                left: Math.max(0, (x - ballRadius) - bounds.left)
            };
            const towardEdgeSpeeds = {
                top: Math.max(0, -vy),
                right: Math.max(0, vx),
                bottom: Math.max(0, vy),
                left: Math.max(0, -vx)
            };
            const blockers = {
                top: hasSolidDominoBetweenBallAndEdge('top', now, bounds),
                right: hasSolidDominoBetweenBallAndEdge('right', now, bounds),
                bottom: hasSolidDominoBetweenBallAndEdge('bottom', now, bounds),
                left: hasSolidDominoBetweenBallAndEdge('left', now, bounds)
            };
            const danger = {};

            for (const direction of ['top', 'right', 'bottom', 'left']) {
                const distance = distances[direction];
                const speed = towardEdgeSpeeds[direction];
                const proximityDanger = clamp01(1 - (distance / edgeDangerDistancePx));
                let projectedDanger = 0;

                if (!blockers[direction] && speed > edgeDangerSpeedFloor && distance <= edgeDangerProjectionDistancePx) {
                    const speedFactor = clamp01((speed - edgeDangerSpeedFloor) / (edgeDangerSpeedCeiling - edgeDangerSpeedFloor));
                    const framesToEdge = distance / Math.max(speed, 0.0001);
                    const timeFactor = clamp01(1 - (framesToEdge / edgeDangerProjectionFrames));
                    projectedDanger = speedFactor * timeFactor;
                }

                danger[direction] = Math.max(proximityDanger, projectedDanger);
            }

            return { bounds, danger };
        }

        function applyEdgeThreatOpacity() {
            edgeThreatTop.style.opacity = Math.pow(clamp01(currentBorderDangerFade.top || 0), 0.8).toFixed(3);
            edgeThreatRight.style.opacity = Math.pow(clamp01(currentBorderDangerFade.right || 0), 0.8).toFixed(3);
            edgeThreatBottom.style.opacity = Math.pow(clamp01(currentBorderDangerFade.bottom || 0), 0.8).toFixed(3);
            edgeThreatLeft.style.opacity = Math.pow(clamp01(currentBorderDangerFade.left || 0), 0.8).toFixed(3);
        }

        function updateEdgeGlow(now = performance.now()) {
            const { danger, bounds } = getEdgeDangerState(now);

            edgeGlowTop.style.opacity = '0';
            edgeGlowRight.style.opacity = '0';
            edgeGlowBottom.style.opacity = '0';
            edgeGlowLeft.style.opacity = '0';

            const ballRadius = getBallRadius(now);
            const fallingOutside = isFalling ? {
                top: (y - ballRadius) <= bounds.top,
                right: (x + ballRadius) >= bounds.right,
                bottom: (y + ballRadius) >= bounds.bottom,
                left: (x - ballRadius) <= bounds.left
            } : null;

            for (const direction of ['top', 'right', 'bottom', 'left']) {
                const targetFadeProgress = fallingOutside && fallingOutside[direction]
                    ? 1
                    : clamp01((danger[direction] - edgeDangerWholeBorderFadeStart) / (edgeDangerWholeBorderFadeEnd - edgeDangerWholeBorderFadeStart));
                if (fallingOutside && fallingOutside[direction]) {
                    currentBorderDangerFade[direction] = 1;
                } else {
                    const fadeStep = targetFadeProgress > currentBorderDangerFade[direction]
                        ? 0.55
                        : edgeDangerFadeInPerFrame;
                    currentBorderDangerFade[direction] += (targetFadeProgress - currentBorderDangerFade[direction]) * fadeStep;
                    currentBorderDangerFade[direction] = clamp01(currentBorderDangerFade[direction]);
                }
            }
            applyPlayfieldBorderThreatOpacity(now);

            edgeThreatTop.style.opacity = Math.pow(clamp01(currentBorderDangerFade.top || 0), 0.8).toFixed(3);
            edgeThreatRight.style.opacity = Math.pow(clamp01(currentBorderDangerFade.right || 0), 0.8).toFixed(3);
            edgeThreatBottom.style.opacity = Math.pow(clamp01(currentBorderDangerFade.bottom || 0), 0.8).toFixed(3);
            edgeThreatLeft.style.opacity = Math.pow(clamp01(currentBorderDangerFade.left || 0), 0.8).toFixed(3);
        }

        function clearEdgeGlow(snap = false) {
            edgeGlowTop.style.opacity = '0';
            edgeGlowRight.style.opacity = '0';
            edgeGlowBottom.style.opacity = '0';
            edgeGlowLeft.style.opacity = '0';
            for (const direction of ['top', 'right', 'bottom', 'left']) {
                if (gameOverTransparentBorders[direction]) {
                    currentBorderDangerFade[direction] = 1;
                } else if (snap) {
                    currentBorderDangerFade[direction] = 0;
                } else {
                    currentBorderDangerFade[direction] += (0 - currentBorderDangerFade[direction]) * edgeDangerClearPerFrame;
                    currentBorderDangerFade[direction] = clamp01(currentBorderDangerFade[direction]);
                }
            }
            applyPlayfieldBorderThreatOpacity();
            applyEdgeThreatOpacity();
        }

        function updateTransitionFlash() {
            if (transitionFlashOpacity > 0.002) {
                transitionFlashOpacity *= 0.88;
                transitionFlash.style.opacity = transitionFlashOpacity.toFixed(3);
            } else {
                transitionFlashOpacity = 0;
                transitionFlash.style.opacity = '0';
            }
        }

        function isSensorActive() {
            return motionSampleCount > 0 || orientationSampleCount > 0;
        }

        function getRestartCopy(isFirstLaunch) {
            if (shouldUseKeyboardPrompt()) {
                return isFirstLaunch ? 'click to start' : 'click to restart';
            }
            
            let text = isFirstLaunch
                ? 'hold phone still and<br>click to start'
                : 'tap anywhere to restart';
                
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function' && !motionPermissionGranted) {
                text += '<br><span style="font-size: 0.85em; opacity: 0.75;">and click Allow if prompted</span>';
            }
            
            return text;
        }

        function getIntroCopy() {
            return shouldUseKeyboardPrompt()
                ? "slowly move mouse to knock all blocks<br>but don't fall off the board"
                : "lightly tilt phone to knock all blocks<br>but don't fall off the board";
        }

        function isStandaloneDisplayMode() {
            return window.matchMedia('(display-mode: standalone)').matches ||
                window.matchMedia('(display-mode: fullscreen)').matches ||
                window.navigator.standalone === true;
        }

        function shouldUseKeyboardPrompt() {
            return window.matchMedia('(hover: hover) and (pointer: fine)').matches;
        }

        function clearStartInputTimeout() {
            if (startInputTimeoutId !== null) {
                clearTimeout(startInputTimeoutId);
                startInputTimeoutId = null;
            }
        }

        function armStartInput(delay = 0) {
            clearStartInputTimeout();
            const arm = () => {
                awaitingStartInput = true;
            };

            if (delay > 0) {
                startInputTimeoutId = setTimeout(() => {
                    startInputTimeoutId = null;
                    arm();
                }, delay);
            } else {
                arm();
            }
        }

        async function handleStartInput(event) {
            if (!awaitingStartInput) return;
            awaitingStartInput = false;
            clearStartInputTimeout();

            initAudio();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            ensureMotionListener();
            ensureOrientationListener();
            await requestMotionAccess();
            startGame();
        }

        function ensureMotionListener() {
            if (motionListenerAttached) return;
            window.addEventListener('devicemotion', handleDeviceMotion);
            motionListenerAttached = true;
        }

        function ensureOrientationListener() {
            if (orientationListenerAttached) return;
            window.addEventListener('deviceorientation', handleDeviceOrientation);
            orientationListenerAttached = true;
        }

        function normalizeScreenAngle(angle) {
            if (!Number.isFinite(angle)) return 0;
            return ((Math.round(angle / 90) * 90) % 360 + 360) % 360;
        }

        function getScreenOrientationAngle() {
            const orientationAngle = Number(window.screen?.orientation?.angle);
            if (Number.isFinite(orientationAngle)) {
                return normalizeScreenAngle(orientationAngle);
            }

            const legacyAngle = Number(window.orientation);
            if (Number.isFinite(legacyAngle)) {
                return normalizeScreenAngle(legacyAngle);
            }

            return viewportWidth > viewportHeight ? 90 : 0;
        }

        function rotatePortraitTiltToViewport(tiltX, tiltY) {
            switch (getScreenOrientationAngle()) {
                case 90:
                    return { x: tiltY, y: -tiltX };
                case 180:
                    return { x: -tiltX, y: -tiltY };
                case 270:
                    return { x: -tiltY, y: tiltX };
                default:
                    return { x: tiltX, y: tiltY };
            }
        }

        function getOrientationFacingMultiplier(beta, gamma) {
            if (!Number.isFinite(beta)) return null;
            const betaRadians = beta * Math.PI / 180;
            const gammaRadians = (Number.isFinite(gamma) ? gamma : 0) * Math.PI / 180;
            return Math.cos(betaRadians) * Math.cos(gammaRadians) < -0.25 ? -1 : 1;
        }

        function getMotionFacingMultiplier(z) {
            const orientationFacingMultiplier = getOrientationFacingMultiplier(latestOrientationBeta, latestOrientationGamma);
            if (orientationFacingMultiplier !== null) {
                return orientationFacingMultiplier;
            }

            return Number.isFinite(z) && z < -1 ? -1 : 1;
        }

        function handleDeviceMotion(event) {
            if (!isPlaying || isPaused) return;
            const acceleration = event.accelerationIncludingGravity;
            const hasSample = acceleration && [acceleration.x, acceleration.y, acceleration.z].some(value => Number.isFinite(value));
            if (!hasSample) return;

            const rx = acceleration.x || 0;
            const ry = acceleration.y || 0;
            if (baselineX === null) {
                baselineX = rx;
                baselineY = ry;
            }
            motionSampleCount++;
            activeInputMode = 'motion';
            const facingMultiplier = getMotionFacingMultiplier(acceleration.z);
            const viewportTilt = rotatePortraitTiltToViewport(
                (rx - baselineX) * facingMultiplier,
                -(ry - baselineY) * facingMultiplier
            );
            ax = viewportTilt.x * 0.4;
            ay = viewportTilt.y * 0.4;
        }

        function handleDeviceOrientation(event) {
            if (!Number.isFinite(event.beta) || !Number.isFinite(event.gamma)) return;
            latestOrientationBeta = event.beta;
            latestOrientationGamma = event.gamma;
            if (!isPlaying || isPaused || activeInputMode === 'motion') return;

            if (baselineBeta === null) {
                baselineBeta = event.beta;
                baselineGamma = event.gamma;
            }

            orientationSampleCount++;
            activeInputMode = 'orientation';
            const facingMultiplier = getOrientationFacingMultiplier(event.beta, event.gamma) ?? 1;
            const viewportTilt = rotatePortraitTiltToViewport(
                (event.gamma - baselineGamma) * facingMultiplier,
                (event.beta - baselineBeta) * facingMultiplier
            );
            ax = viewportTilt.x * 0.06;
            ay = viewportTilt.y * 0.06;
        }

        async function requestMotionAccess() {
            const requests = [];

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                requests.push(DeviceMotionEvent.requestPermission().catch(() => 'denied'));
            }

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                requests.push(DeviceOrientationEvent.requestPermission().catch(() => 'denied'));
            }

            if (!requests.length) {
                motionPermissionGranted = true;
                return true;
            }

            const results = await Promise.all(requests);
            const granted = results.includes('granted');
            if (granted) {
                motionPermissionGranted = true;
            }
            return granted;
        }

        function handlePointerControlStart(event) {
            if (!isPlaying || isPaused || isSensorActive()) return;
            if (shouldUseKeyboardPrompt()) return;
            pointerControlActive = true;
            pointerControlId = event.pointerId;
            pointerAnchorX = event.clientX;
            pointerAnchorY = event.clientY;
            gameArea.setPointerCapture?.(event.pointerId);
        }

        function handlePointerControlMove(event) {
            if (isSensorActive() || !isPlaying || isPaused) return;
            if (!shouldUseKeyboardPrompt() && (!pointerControlActive || pointerControlId !== event.pointerId)) return;
            if (shouldUseKeyboardPrompt() && !mouseOriginCaptured) {
                pointerAnchorX = event.clientX;
                pointerAnchorY = event.clientY;
                mouseOriginCaptured = true;
                showMouseOriginCrosshair();
            }
            updateMouseOriginLine(event.clientX, event.clientY);
            const dx = event.clientX - pointerAnchorX;
            const dy = event.clientY - pointerAnchorY;
            const controlRange = shouldUseKeyboardPrompt() ? mouseControlRange : 140;
            const accelerationStrength = shouldUseKeyboardPrompt() ? getDesktopMouseAccelerationStrength() : 0.35;
            ax = clampValue(dx / controlRange, 2.5) * accelerationStrength;
            ay = clampValue(dy / controlRange, 2.5) * accelerationStrength;
            pointerControlActive = true;
            activeInputMode = 'pointer';
        }

        function handlePointerControlEnd(event) {
            if (pointerControlId !== null && event.pointerId !== undefined && pointerControlId !== event.pointerId) return;
            if (shouldUseKeyboardPrompt()) return;
            pointerControlActive = false;
            pointerControlId = null;
            if (!isSensorActive()) {
                ax = 0;
                ay = 0;
            }
        }

        function spawnBlocks(targetLevel) {
            dominoContainer.innerHTML = '';
            dominoes = [];
            dominoCalloutCount = 0;
            lastDominoCalloutAt = -Infinity;
            clearBallCallout();
            const size = getBlockSize();
            const count = getBlockCountForLevel(targetLevel);
            const bounds = getPlayfieldBounds();
            const spawnWidth = bounds.right - bounds.left;
            const spawnHeight = bounds.bottom - bounds.top;

            for (let i = 0; i < count; i++) {
                let rx;
                let ry;
                let overlap = true;

                while (overlap) {
                    rx = bounds.left + Math.random() * Math.max(spawnWidth - size, 1);
                    ry = bounds.top + Math.random() * Math.max(spawnHeight - size, 1);
                    overlap = Math.hypot(rx - x, ry - y) <= 120;

                    if (!overlap) {
                        for (const domino of dominoes) {
                            if (rx < domino.x + size && rx + size > domino.x && ry < domino.y + size && ry + size > domino.y) {
                                overlap = true;
                                break;
                            }
                        }
                    }
                }

                const element = document.createElement('div');
                element.className = 'domino';
                element.style.width = size + 'px';
                element.style.height = size + 'px';
                dominoContainer.appendChild(element);
                dominoes.push({
                    x: rx,
                    y: ry,
                    width: size,
                    height: size,
                    vx: 0,
                    vy: 0,
                    previousVx: 0,
                    previousVy: 0,
                    recentAcceleration: 0,
                    angle: 0,
                    angularVelocity: 0,
                    hitCount: 0,
                    lastHitAt: -Infinity,
                    lastWallCalloutAt: -Infinity,
                    knocked: false,
                    knockedAt: null,
                    repositionUntil: null,
                    removeAt: null,
                    element
                });
            }
        }

        function checkCollisions(now, ballRadius) {
            for (const domino of dominoes) {
                if (!isDominoSolid(domino, now)) continue;

                const collision = getBallDominoCollision(domino, now, x, y, ballRadius);
                if (!collision) continue;

                playSound(400, 0.05, 0.08);
                const wasKnocked = domino.knocked;
                const impactSpeed = Math.hypot(vx, vy);
                if (impactSpeed > 0.75) {
                    registerDominoHit(domino, now);
                }
                markDominoKnocked(domino, now);

                x += collision.normalX * collision.overlap;
                y += collision.normalY * collision.overlap;

                domino.angularVelocity += ((x - collision.centerX) * vy - (y - collision.centerY) * vx) * angularImpactStrength;
                domino.vx += vx * 0.6;
                domino.vy += vy * 0.6;
                clampDominoMotion(domino);
                if (impactSpeed > 1.8) {
                    emitParticles(collision.contactX, collision.contactY, Math.min(1.4, impactSpeed / 10 + (wasKnocked ? 0 : 0.35)));
                    triggerTransitionFlash(0.1);
                }

                const velocityAlongNormal = (vx * collision.normalX) + (vy * collision.normalY);
                if (velocityAlongNormal < 0) {
                    vx -= (1 + dampening) * velocityAlongNormal * collision.normalX;
                    vy -= (1 + dampening) * velocityAlongNormal * collision.normalY;
                }
            }

            for (let i = 0; i < dominoes.length; i++) {
                for (let j = i + 1; j < dominoes.length; j++) {
                    const first = dominoes[i];
                    const second = dominoes[j];
                    if (!isDominoSolid(first, now) || !isDominoSolid(second, now)) continue;
                    const collision = getDominoDominoCollision(first, second, now);
                    if (!collision) continue;

                    playSound(300, 0.03, 0.08);
                    const firstWasKnocked = first.knocked;
                    const secondWasKnocked = second.knocked;
                    const collisionImpact = Math.hypot(first.vx - second.vx, first.vy - second.vy);
                    const separation = collision.overlap / 2;
                    const tangentX = -collision.normalY;
                    const tangentY = collision.normalX;

                    first.x -= collision.normalX * separation;
                    first.y -= collision.normalY * separation;
                    second.x += collision.normalX * separation;
                    second.y += collision.normalY * separation;

                    const firstNormalSpeed = (first.vx * collision.normalX) + (first.vy * collision.normalY);
                    const secondNormalSpeed = (second.vx * collision.normalX) + (second.vy * collision.normalY);
                    const relativeNormalSpeed = secondNormalSpeed - firstNormalSpeed;

                    if (relativeNormalSpeed < 0) {
                        const restitution = 0.82;
                        const firstTangentSpeed = (first.vx * tangentX) + (first.vy * tangentY);
                        const secondTangentSpeed = (second.vx * tangentX) + (second.vy * tangentY);
                        const newFirstNormalSpeed = secondNormalSpeed * restitution;
                        const newSecondNormalSpeed = firstNormalSpeed * restitution;

                        first.vx = (tangentX * firstTangentSpeed) + (collision.normalX * newFirstNormalSpeed);
                        first.vy = (tangentY * firstTangentSpeed) + (collision.normalY * newFirstNormalSpeed);
                        second.vx = (tangentX * secondTangentSpeed) + (collision.normalX * newSecondNormalSpeed);
                        second.vy = (tangentY * secondTangentSpeed) + (collision.normalY * newSecondNormalSpeed);

                        const tangentialSlip = secondTangentSpeed - firstTangentSpeed;
                        first.angularVelocity = clampValue(first.angularVelocity + (tangentialSlip * 0.02), maxAngularVelocity);
                        second.angularVelocity = clampValue(second.angularVelocity - (tangentialSlip * 0.02), maxAngularVelocity);
                    }

                    first.angularVelocity = clampValue(first.angularVelocity * 0.92, maxAngularVelocity);
                    second.angularVelocity = clampValue(second.angularVelocity * 0.92, maxAngularVelocity);
                    clampDominoMotion(first);
                    clampDominoMotion(second);

                    if (collisionImpact > 0.75) {
                        registerDominoHit(first, now);
                        registerDominoHit(second, now);
                    }

                    if (first.knocked || second.knocked) {
                        markDominoKnocked(first, now);
                        markDominoKnocked(second, now);
                        if (collisionImpact > 0.75) {
                            const newDominoKnocks = (firstWasKnocked ? 0 : 1) + (secondWasKnocked ? 0 : 1);
                            if (newDominoKnocks > 0 && (firstWasKnocked || secondWasKnocked)) {
                                registerDominoCallout(now, newDominoKnocks);
                            }
                        }
                    }
                }
            }
        }

        function beginFall() {
            gameOverTransparentBorders.top = false;
            gameOverTransparentBorders.right = false;
            gameOverTransparentBorders.bottom = false;
            gameOverTransparentBorders.left = false;
            isPlaying = false;
            isFalling = true;
            isPaused = false;
            pauseStartedAt = null;
            wasAutoPausedOnBlur = false;
            isLevelingUp = false;
            hideMouseOriginCrosshair();
            clearPendingLevelAdvance();
            clearBallCallout();
            setShrinkWarningTone(false);
            applyPauseState();
        }

        function finishRound() {
            const finishNow = performance.now();
            gameOverTransparentBorders.top = false;
            gameOverTransparentBorders.right = false;
            gameOverTransparentBorders.bottom = false;
            gameOverTransparentBorders.left = false;
            isPlaying = false;
            isFalling = false;
            isPaused = false;
            pauseStartedAt = null;
            wasAutoPausedOnBlur = false;
            isLevelingUp = false;
            isShowingGameOver = true;
            awaitingStartInput = false;
            clearPendingLevelAdvance();
            clearStartInputTimeout();
            setShrinkWarningTone(false);
            setDesktopQrVisible(false);
            if (levelGrowAnimation?.source === 'wall_knock') {
                const stabilizedScale = Math.min(1, getPlayfieldScale(finishNow));
                if (playfieldScale > 0 && Math.abs(stabilizedScale - playfieldScale) > 0.000001) {
                    applyPlayfieldScaleRatio(stabilizedScale / playfieldScale);
                }
                levelGrowAnimation = null;
                playfieldScale = stabilizedScale;
                lastPlayfieldScaleUpdateAt = finishNow;
                updatePlayfieldFrame(finishNow);
            }

            if (rollGain) {
                rollGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }

            const madeNewBest = !currentRunIsPreview && level > bestScore;
            if (madeNewBest) {
                bestScore = level;
                persistBestScore(bestScore);
            }

            captureAchievementRecordHighlights();
            updateAchievementSummaryState();
            updateAchievementBestRecords();

            dominoes.forEach(domino => {
                domino.element.style.opacity = '';
                domino.element.classList.add('game-over-fade');
            });

            ball.style.display = 'none';
            resetTrail();
            clearParticles();
            clearBallCallout();
            clearEdgeGlow(true);
            startLevelGrowAnimation(finishNow);
            applyPauseState();
            introText.style.display = bestScore <= 2 ? 'block' : 'none';
            updateOverlayTextLayout();
            restartText.innerHTML = getRestartCopy(false);
            restartText.style.display = 'block';
            updateLevelIndicatorState();
            updateAchievementSummaryState();
            if (madeNewBest) {
                playNewBestCelebrationSound();
            }
            syncDesktopStartUiVisibility();
            armStartInput(250);
        }

        function update() {
            const now = performance.now();
            if (isPlaying && !isPaused && !isLevelingUp) {
                updateIdleCycle(now);
            }
            if (!isPaused || !isPlaying) {
                updateLevelGrowAnimation(now);
            }
            if (isPlaying && !isPaused) {
                updateLevelShrinkCueAudio(now);
            }

            if (isPlaying && !isPaused) {
                const ballFriction = getBallFriction();
                vx += ax;
                vy += ay;
                vx *= ballFriction;
                vy *= ballFriction;
                x += vx;
                y += vy;

                const speed = Math.hypot(vx, vy);
                const ballRadius = getBallRadius(now);
                const bounds = getPlayfieldBounds(now);
                if (rollGain) {
                    const targetGain = isMuted ? 0 : Math.min((speed / 15) * 0.85, 0.765);
                    rollGain.gain.setTargetAtTime(targetGain, audioCtx.currentTime, 0.1);
                    rollOsc.frequency.setTargetAtTime(30 + speed * 1.5, audioCtx.currentTime, 0.1);
                }

                if (!isPointInsidePlayfield(x, y, now)) {
                    beginFall();
                } else {
                    checkCollisions(now, ballRadius);
                    let unclearedCount = 0;

                    for (let i = dominoes.length - 1; i >= 0; i--) {
                        const domino = dominoes[i];
                        if (!domino.knocked) {
                            unclearedCount++;
                        } else if (domino.removeAt !== null) {
                            if (now >= domino.removeAt) {
                                domino.element.remove();
                                dominoes.splice(i, 1);
                                continue;
                            }

                            domino.element.style.opacity = '1';
                        }

                        domino.recentAcceleration = Math.hypot(
                            domino.vx - (domino.previousVx ?? domino.vx),
                            domino.vy - (domino.previousVy ?? domino.vy)
                        );

                        const knockProgress = domino.knocked && domino.knockedAt !== null
                            ? Math.min(1, (now - domino.knockedAt) / knockedBlockLifetimeMs)
                            : 0;
                        const knockedMotionDamping = domino.knocked ? 1 - (knockProgress * 0.14) : 1;

                        domino.x += domino.vx * knockedMotionDamping;
                        domino.y += domino.vy * knockedMotionDamping;
                        domino.angle += domino.angularVelocity * knockedMotionDamping;
                        domino.vx *= blockFriction * knockedMotionDamping;
                        domino.vy *= blockFriction * knockedMotionDamping;
                        domino.angularVelocity *= angularVelocityDamping * knockedMotionDamping;
                        clampDominoMotion(domino);
                        if (domino.angle > 360 || domino.angle < -360) {
                            domino.angle %= 360;
                        }

                        const hitRect = getDominoHitRect(domino, now);
                        if (isDominoSolid(domino, now)) {
                            if (hitRect.x < bounds.left) {
                                domino.x += bounds.left - hitRect.x;
                                domino.vx *= -0.8;
                                playSound(200, 0.03, 0.1, 'triangle');
                                registerWallKnock(domino, hitRect, 'x', now);
                            }
                            if (hitRect.x + hitRect.width > bounds.right) {
                                domino.x -= (hitRect.x + hitRect.width) - bounds.right;
                                domino.vx *= -0.8;
                                playSound(200, 0.03, 0.1, 'triangle');
                                registerWallKnock(domino, hitRect, 'x', now);
                            }
                            if (hitRect.y < bounds.top) {
                                domino.y += bounds.top - hitRect.y;
                                domino.vy *= -0.8;
                                playSound(200, 0.03, 0.1, 'triangle');
                                registerWallKnock(domino, hitRect, 'y', now);
                            }
                            if (hitRect.y + hitRect.height > bounds.bottom) {
                                domino.y -= (hitRect.y + hitRect.height) - bounds.bottom;
                                domino.vy *= -0.8;
                                playSound(200, 0.03, 0.1, 'triangle');
                                registerWallKnock(domino, hitRect, 'y', now);
                            }
                        } else if (
                            hitRect.x + hitRect.width < bounds.left - dominoExitBuffer ||
                            hitRect.x > bounds.right + dominoExitBuffer ||
                            hitRect.y + hitRect.height < bounds.top - dominoExitBuffer ||
                            hitRect.y > bounds.bottom + dominoExitBuffer
                        ) {
                            domino.element.remove();
                            dominoes.splice(i, 1);
                            continue;
                        }

                        const dominoScale = getDominoScale(domino, now) * getPlayfieldScale(now);

                        domino.element.style.left = domino.x + 'px';
                        domino.element.style.top = domino.y + 'px';
                        domino.element.style.transform = `rotate(${domino.angle}deg) scale(${dominoScale.toFixed(3)})`;
                        domino.previousVx = domino.vx;
                        domino.previousVy = domino.vy;
                    }

                    if (unclearedCount === 0 && !isLevelingUp) {
                        isLevelingUp = true;
                        clearPendingLevelAdvance();
                        clearBallCallout();
                        triggerTransitionFlash(isMilestoneLevel(level + 1) ? 0.42 : 0.26);
                        levelAdvanceTimeoutId = setTimeout(() => {
                            levelAdvanceTimeoutId = null;
                            if (!isPlaying || isFalling) {
                                isLevelingUp = false;
                                return;
                            }
                            const nextLevelStartAt = performance.now();
                            level++;
                            updateLevelIndicatorState();
                            bumpLevelIndicator();
                            spawnBlocks(level);
                            armLevelStartShrinkDelay(level, nextLevelStartAt);
                            isLevelingUp = false;
                        }, 1000);
                    }
                }
            }

            if (isFalling && !isPaused) {
                x += vx * 0.5;
                y += vy * 0.5;
                ballScale *= 0.85;

                if (rollGain) {
                    rollGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                }

                if (ballScale < 0.05) {
                    finishRound();
                }
            }

            updateTrail();
            updateParticles();
            updateTransitionFlash();
            updatePlayfieldFrame(now);
            updateBallCallout(now);
            if (isPlaying || isFalling) {
                updateEdgeGlow(now);
            } else {
                clearEdgeGlow(false);
            }

            if (isPlaying || isFalling || levelGrowAnimation) {
                ball.style.transform = `translate(${x - radius}px, ${y - radius}px) scale(${getBallVisualScale(now).toFixed(3)})`;
                animationFrameId = requestAnimationFrame(update);
            } else {
                animationFrameId = null;
            }
        }

        function startGame() {
            awaitingStartInput = false;
            clearStartInputTimeout();
            clearPendingLevelAdvance();
            if (animationFrameId !== null) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            ensureMotionListener();
            ensureOrientationListener();
            updateViewportBounds();

            resetInputState();
            resetRunAchievementTotals();
            updateAchievementSummaryState();
            bestScoreBeforeRun = bestScore;
            currentRunStartLevel = previewLevel;
            currentRunIsPreview = previewLevel > 1;
            level = currentRunStartLevel;
            x = safeInsets.left + (viewportWidth / 2);
            y = safeInsets.top + (viewportHeight / 2);
            vx = 0;
            vy = 0;
            ballScale = 1;
            ball.style.opacity = '1';
            ball.style.display = 'block';
            resetTrail();
            clearParticles();
            clearBallCallout();
            resetRunAchievementTotals();
            updateAchievementSummaryState();
            setShrinkWarningTone(false);
            transitionFlashOpacity = 0;
            transitionFlash.style.opacity = '0';
            lastGameStartedAt = performance.now();

            isPlaying = true;
            isFalling = false;
            isPaused = false;
            pauseStartedAt = null;
            wasAutoPausedOnBlur = false;
            isLevelingUp = false;
            isShowingGameOver = false;
            setDesktopQrVisible(false);
            const runStartAt = performance.now();
            resetIdleShrinkState(runStartAt);
            armLevelStartShrinkDelay(level, runStartAt);

            applyPauseState();
            spawnBlocks(level);

            introText.style.display = 'none';
            restartText.style.display = 'none';
            syncDesktopStartUiVisibility();
            updateLevelIndicatorState();

            update();
        }

        function handleEarlyDeviceMotion(event) {
            if (event.accelerationIncludingGravity && 
                Number.isFinite(event.accelerationIncludingGravity.x)) {
                motionPermissionGranted = true;
                window.removeEventListener('devicemotion', handleEarlyDeviceMotion);
                if (restartText && restartText.style.display !== 'none') {
                    restartText.innerHTML = getRestartCopy(!isShowingGameOver);
                }
            }
        }
        window.addEventListener('devicemotion', handleEarlyDeviceMotion);

        createTrailNodes();
        updateViewportBounds();

        ball.style.display = 'block';
        positionBallAtCenter();
        introText.style.display = 'block';
        restartText.style.display = 'block';
        restartText.innerHTML = getRestartCopy(true);
        updateLevelIndicatorState();
        updateAchievementSummaryState();
        applyPauseState();
        applyMuteState();
        syncDesktopStartUiVisibility();
        armStartInput();

        gameArea.addEventListener('pointerdown', handlePointerControlStart);
        gameArea.addEventListener('pointermove', handlePointerControlMove);
        gameArea.addEventListener('pointerup', handlePointerControlEnd);
        gameArea.addEventListener('pointercancel', handlePointerControlEnd);
        gameArea.addEventListener('click', handlePlayfieldPauseToggle);
        gameArea.addEventListener('touchend', handlePlayfieldPauseToggle, { passive: false });
        window.addEventListener('pointermove', handlePointerControlMove);
        muteToggle.addEventListener('pointerdown', event => event.stopPropagation());
        muteToggle.addEventListener('touchend', event => event.stopPropagation());
        muteToggle.addEventListener('click', event => {
            event.stopPropagation();
            toggleMute();
        });
        mobileVersionLink.addEventListener('pointerdown', event => event.stopPropagation());
        mobileVersionLink.addEventListener('touchend', event => event.stopPropagation());
        mobileVersionLink.addEventListener('click', event => {
            event.stopPropagation();
            setDesktopQrVisible(!desktopQrVisible);
        });
        desktopQrCard.addEventListener('pointerdown', event => event.stopPropagation());
        desktopQrCard.addEventListener('touchend', event => event.stopPropagation());
        desktopQrCard.addEventListener('click', event => event.stopPropagation());
        document.addEventListener('click', handleStartInput);
        document.addEventListener('touchend', handleStartInput);

        window.addEventListener('resize', () => {
            updateViewportBounds();
            updateLevelIndicatorState();
        });
        window.addEventListener('blur', handleWindowBlur);
        window.addEventListener('focus', handleWindowFocus);
        window.addEventListener('orientationchange', () => setTimeout(() => {
            updateViewportBounds();
            updateLevelIndicatorState();
        }, 150));
    </script>
</body>
</html>
