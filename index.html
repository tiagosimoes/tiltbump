<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#000000">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
    <title>tiltbump</title>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --bg-top: #324b61;
            --bg-bottom: #0c1825;
            --bg-accent: rgba(123, 193, 255, 0.2);
            --bg-accent-soft: rgba(74, 113, 161, 0.18);
            --hud-color: rgba(208, 220, 236, 0.72);
            --hud-solid: rgb(176, 185, 198);
            --level-shadow: rgba(123, 193, 255, 0.16);
            --ball-highlight: #fff2b4;
            --ball-mid: #f4c542;
            --ball-dark: #cc8c05;
            --ball-glow: rgba(244, 197, 66, 0.34);
            --trail-color: rgba(244, 197, 66, 0.5);
            --block-light: #f7d754;
            --block-mid: #f1c40f;
            --block-dark: #c79607;
            --block-sheen: rgba(255, 255, 255, 0.18);
            --block-shadow: rgba(0, 0, 0, 0.28);
            --knocked-light: #566a7f;
            --knocked-mid: #34495e;
            --knocked-dark: #233240;
            --knocked-sheen: rgba(255, 255, 255, 0.08);
            --edge-color: rgba(244, 197, 66, 0.34);
            --flash-color: rgba(123, 193, 255, 0.22);
            --record-color-soft: rgba(241, 196, 15, 0.15);
            --record-color-solid: rgba(241, 196, 15, 0.92);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: visible;
            background-color: #000;
            touch-action: none;
            overscroll-behavior: none;
            transition: background-color 0.9s ease;
        }

        html {
            background: #000;
            color-scheme: dark;
        }

        body {
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 200;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        #gameArea {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            z-index: 0;
            background: transparent;
        }

        #safeAreaProbe {
            position: fixed;
            inset: 0;
            width: 0;
            height: 0;
            visibility: hidden;
            pointer-events: none;
            padding-top: env(safe-area-inset-top, 0px);
            padding-right: env(safe-area-inset-right, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            box-sizing: border-box;
        }

        #levelIndicator {
            position: absolute;
            top: 52%;
            left: 50%;
            transform: translate(-50%, -50%) scale(var(--level-indicator-scale, 1));
            transform-origin: center center;
            font-size: 24vh;
            font-size: 24dvh;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.15);
            z-index: 1;
            pointer-events: none;
            transition: color 0.35s ease, text-shadow 0.35s ease;
            display: none;
        }

        #levelIndicator.new-best {
            color: var(--record-color-soft);
        }

        #levelIndicator.milestone {
            text-shadow: 0 0 36px var(--level-shadow);
        }

        #levelIndicator.game-over {
            color: var(--hud-solid);
            z-index: 1201;
            opacity: 1;
        }

        #levelIndicator.game-over.new-best {
            color: var(--record-color-solid);
        }

        #levelIndicator.pop {
            animation:
                levelPop 0.6s cubic-bezier(0.2, 0.8, 0.2, 1),
                levelLighten 0.6s ease-out;
        }

        @keyframes levelPop {
            0% {
                transform: translate(-50%, -50%) scale(calc(var(--level-indicator-scale, 1) * 0.92));
                opacity: 0.8;
            }
            45% {
                transform: translate(-50%, -50%) scale(calc(var(--level-indicator-scale, 1) * 1.08));
            }
            100% {
                transform: translate(-50%, -50%) scale(var(--level-indicator-scale, 1));
                opacity: 1;
            }
        }

        @keyframes levelLighten {
            0% {
                filter: brightness(1);
            }
            30% {
                filter: brightness(2.15);
            }
            100% {
                filter: brightness(1);
            }
        }

        #edgeGlow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
            border-radius: 0;
        }

        #playfieldBorder {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            box-sizing: border-box;
            border: 4px solid rgba(241, 196, 15, 0.82);
            border-radius: 0;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.08) inset,
                0 0 28px rgba(123, 193, 255, 0.12);
            opacity: 0;
            pointer-events: none;
            z-index: 2;
            transition: opacity 0.12s linear, border-color 0.12s linear, box-shadow 0.12s linear, border-width 0.12s linear;
        }

        #edgeThreatOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 3;
            overflow: visible;
            border-radius: 0;
        }

        .edgeThreatCutout {
            position: absolute;
            opacity: 0;
            transition: opacity 0.08s linear;
            will-change: opacity;
        }

        .edgeThreatTop,
        .edgeThreatBottom {
            left: 0;
            width: 100%;
            height: 40px;
        }

        .edgeThreatLeft,
        .edgeThreatRight {
            top: 0;
            width: 40px;
            height: 100%;
        }

        .edgeThreatTop {
            top: -28px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.98) 32%, rgba(0, 0, 0, 0.72) 58%, rgba(0, 0, 0, 0.2) 78%, rgba(0, 0, 0, 0) 100%);
        }

        .edgeThreatBottom {
            bottom: -28px;
            background: linear-gradient(0deg, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.98) 32%, rgba(0, 0, 0, 0.72) 58%, rgba(0, 0, 0, 0.2) 78%, rgba(0, 0, 0, 0) 100%);
        }

        .edgeThreatLeft {
            left: -28px;
            background: linear-gradient(90deg, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.98) 32%, rgba(0, 0, 0, 0.72) 58%, rgba(0, 0, 0, 0.2) 78%, rgba(0, 0, 0, 0) 100%);
        }

        .edgeThreatRight {
            right: -28px;
            background: linear-gradient(270deg, rgba(0, 0, 0, 1) 0%, rgba(0, 0, 0, 0.98) 32%, rgba(0, 0, 0, 0.72) 58%, rgba(0, 0, 0, 0.2) 78%, rgba(0, 0, 0, 0) 100%);
        }

        #playfieldTint {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            border-radius: 0;
            background: var(--bg-top);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            will-change: left, top, width, height, border-radius, opacity;
        }

        #outsideGlow {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            border-radius: 0;
            background: transparent;
            will-change: left, top, width, height, border-radius, opacity, box-shadow;
        }

        .edgeGlowSide {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.12s linear;
        }

        .edgeGlowTop,
        .edgeGlowBottom {
            left: 0;
            width: 100%;
            height: 20vh;
            height: 20dvh;
        }

        .edgeGlowTop {
            top: 0;
            background: linear-gradient(180deg, var(--edge-color) 0%, transparent 100%);
        }

        .edgeGlowBottom {
            bottom: 0;
            background: linear-gradient(0deg, var(--edge-color) 0%, transparent 100%);
        }

        .edgeGlowLeft,
        .edgeGlowRight {
            top: 0;
            width: 20vw;
            height: 100%;
        }

        .edgeGlowLeft {
            left: 0;
            background: linear-gradient(90deg, var(--edge-color) 0%, transparent 100%);
        }

        .edgeGlowRight {
            right: 0;
            background: linear-gradient(270deg, var(--edge-color) 0%, transparent 100%);
        }

        #trailContainer,
        #particleContainer,
        #transitionFlash {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        #trailContainer {
            z-index: 3;
        }

        .trailGhost {
            position: absolute;
            width: 50px;
            height: 50px;
            margin-left: -25px;
            margin-top: -25px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.42) 0%, var(--trail-color) 58%, transparent 100%);
            filter: blur(2px);
            opacity: 0;
            transform: translate(-9999px, -9999px) scale(0.7);
            will-change: transform, opacity;
        }

        #particleContainer {
            z-index: 6;
        }

        .impactParticle {
            position: absolute;
            width: 10px;
            height: 10px;
            margin-left: -5px;
            margin-top: -5px;
            border-radius: 999px;
            background: var(--trail-color);
            opacity: 0;
            will-change: transform, opacity;
        }

        #transitionFlash {
            z-index: 7;
            opacity: 0;
            background:
                radial-gradient(circle at 50% 50%, var(--flash-color) 0%, transparent 56%);
            will-change: opacity;
        }

        #ballCallout {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            z-index: 8;
            white-space: nowrap;
            color: rgba(255, 247, 225, 0.96);
            font-size: 18px;
            letter-spacing: 0.03em;
            font-weight: 400;
            text-shadow:
                0 0 4px var(--bg-bottom),
                0 0 12px var(--bg-bottom);
            transform: translate(-9999px, -9999px);
            transform-origin: left center;
            will-change: transform, opacity;
        }

        #mouseOriginCrosshair {
            position: absolute;
            top: 0;
            left: 0;
            width: 20px;
            height: 20px;
            margin: -10px 0 0 -10px;
            opacity: 0;
            pointer-events: none;
            z-index: 6;
            transform: translate(-9999px, -9999px);
        }

        #mouseOriginLine {
            position: absolute;
            top: 0;
            left: 0;
            height: 1px;
            width: 0;
            opacity: 0;
            pointer-events: none;
            z-index: 6;
            background: rgba(255, 190, 92, 0.58);
            transform-origin: 0 50%;
            transform: translate(-9999px, -9999px);
        }

        #mouseOriginLine::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 0;
            height: 0;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            border-left: 8px solid rgba(255, 218, 136, 0.9);
            transform: translateY(-50%);
        }

        #mouseOriginCrosshair::before,
        #mouseOriginCrosshair::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            background: rgba(232, 240, 255, 0.52);
            transform: translate(-50%, -50%);
        }

        #mouseOriginCrosshair::before {
            width: 20px;
            height: 1px;
        }

        #mouseOriginCrosshair::after {
            width: 1px;
            height: 20px;
        }

        #dominoContainer {
            position: absolute;
            inset: 0;
        }

        #ball {
            position: absolute;
            top: 0;
            left: 0;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 35% 30%, var(--ball-highlight) 0%, var(--ball-mid) 58%, var(--ball-dark) 100%);
            border-radius: 50%;
            box-shadow:
                0 0 28px var(--ball-glow),
                inset -10px -10px 20px rgba(0,0,0,0.28),
                inset 5px 5px 10px rgba(255,255,255,0.24),
                5px 5px 15px rgba(0,0,0,0.36);
            display: none;
            z-index: 5;
            transform-origin: center;
            will-change: transform;
        }

        .domino {
            position: absolute;
            border-radius: 4px;
            background: transparent;
            filter: drop-shadow(3px 5px 8px var(--block-shadow));
            transition: opacity 0.3s ease, filter 0.15s ease;
            z-index: 4;
            transform-origin: center;
            will-change: transform;
        }

        .domino.game-over-fade {
            opacity: 0;
            transition: opacity 0.55s ease, filter 0.15s ease;
        }

        .domino::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 4px;
            background: linear-gradient(145deg, var(--block-light) 0%, var(--block-mid) 58%, var(--block-dark) 100%);
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.25),
                        inset 2px 2px 4px var(--block-sheen);
            transition: background 0.1s, box-shadow 0.1s;
        }

        .knocked {
            filter: drop-shadow(2px 3px 5px rgba(0,0,0,0.18));
        }

        .knocked::before {
            background: linear-gradient(145deg, var(--knocked-light) 0%, var(--knocked-mid) 58%, var(--knocked-dark) 100%);
            box-shadow: inset -4px -4px 8px rgba(0,0,0,0.25),
                        inset 2px 2px 4px var(--knocked-sheen);
        }

        #introText, #bestScoreDisplay, #restartText, #mobileVersionLinkWrap, #desktopQrPanel {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) scale(var(--overlay-text-scale, 1));
            transform-origin: center top;
            width: calc(100vw - 32px);
            max-width: 560px;
            padding: 0 calc(16px + var(--safe-right)) 0 calc(16px + var(--safe-left));
            box-sizing: border-box;
            font-size: 20px;
            color: var(--hud-color);
            text-align: center;
            pointer-events: none;
            line-height: 1.4;
            font-weight: inherit;
        }

        #achievementSummary {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) scale(var(--overlay-text-scale, 1));
            transform-origin: center top;
            width: calc(100vw - 32px);
            max-width: 560px;
            padding: 0 calc(16px + var(--safe-right)) 0 calc(16px + var(--safe-left));
            box-sizing: border-box;
            display: none;
            text-align: center;
            font-size: 20px;
            color: var(--hud-color);
            line-height: 1.25;
            font-weight: inherit;
            pointer-events: none;
            z-index: 1000;
            white-space: normal;
        }

        #achievementSummary .achievement-line {
            margin-top: 2px;
        }

        #achievementSummary .achievement-line:first-child {
            margin-top: 0;
        }

        #achievementSummary .achievement-line.record {
            color: var(--record-color-solid);
        }

        #introText {
            top: calc(30% + var(--safe-top));
            z-index: 1000;
            display: none;
        }

        #introText.game-over {
            color: rgba(208, 220, 236, 0.42);
        }

        #bestScoreDisplay {
            top: calc(50% - 11vh);
            top: calc(50% - 11dvh);
            z-index: 1;
            color: rgba(255, 255, 255, 0.15);
            display: none;
        }

        #bestScoreDisplay.new-high-score {
            color: var(--record-color-soft);
        }

        #bestScoreDisplay.game-over {
            z-index: 1000;
            color: var(--hud-solid);
        }

        #bestScoreDisplay.game-over.new-high-score {
            color: var(--record-color-solid);
        }

        #restartText {
            top: calc(50% + 15vh);
            top: calc(50% + 15dvh);
            z-index: 1000;
            display: none;
            white-space: normal;
        }

        #mobileVersionLinkWrap {
            top: calc(50% + 24vh);
            top: calc(50% + 24dvh);
            z-index: 1001;
            display: none;
        }

        #mobileVersionLink {
            pointer-events: auto;
            appearance: none;
            border: 0;
            background: transparent;
            color: rgba(208, 220, 236, 0.86);
            font: inherit;
            font-size: 18px;
            font-weight: 300;
            line-height: 1.35;
            text-decoration: underline;
            text-underline-offset: 0.18em;
            cursor: pointer;
            padding: 0;
        }

        #mobileVersionLink:hover,
        #mobileVersionLink:focus-visible {
            color: rgba(255, 255, 255, 0.98);
            outline: none;
        }

        #desktopQrPanel {
            top: calc(50% + 31vh);
            top: calc(50% + 31dvh);
            z-index: 1002;
            display: none;
            color: rgba(208, 220, 236, 0.86);
        }

        #desktopQrCard {
            pointer-events: auto;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border-radius: 18px;
            background: rgba(12, 24, 37, 0.72);
            box-shadow:
                0 12px 32px rgba(0, 0, 0, 0.36),
                inset 0 0 0 1px rgba(255, 255, 255, 0.07);
            text-decoration: none;
            color: inherit;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        #desktopQrCard:hover,
        #desktopQrCard:focus-visible {
            box-shadow:
                0 14px 36px rgba(0, 0, 0, 0.42),
                inset 0 0 0 1px rgba(255, 255, 255, 0.12);
            outline: none;
        }

        #desktopQrImage {
            width: min(42vw, 180px);
            height: min(42vw, 180px);
            border-radius: 12px;
            background: white;
            display: block;
        }

        #desktopQrCaption {
            font-size: 15px;
            line-height: 1.35;
            color: rgba(232, 240, 255, 0.82);
        }

        @media (max-height: 500px) {
            #bestScoreDisplay {
                top: calc(50% - 15vh);
                top: calc(50% - 15dvh);
            }

            #mobileVersionLinkWrap {
                top: calc(50% + 22vh);
                top: calc(50% + 22dvh);
            }

            #desktopQrPanel {
                top: calc(50% + 28vh);
                top: calc(50% + 28dvh);
            }

            #desktopQrImage {
                width: min(28vw, 132px);
                height: min(28vw, 132px);
            }
        }

        #pauseOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            z-index: 1200;
            transition: opacity 0.16s linear;
        }

        #pauseOverlay .pauseBar {
            width: 10px;
            height: 42px;
            border-radius: 999px;
            background: rgba(235, 244, 255, 0.78);
            box-shadow:
                0 0 10px rgba(12, 24, 37, 0.22),
                0 0 24px rgba(255, 255, 255, 0.08);
        }

        .hudIconButton {
            position: absolute;
            width: 30px;
            height: 30px;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            color: rgba(255,255,255,0.68);
            font: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            z-index: 1100;
            cursor: pointer;
            text-shadow:
                0 0 4px var(--bg-bottom),
                0 0 10px var(--bg-bottom);
        }

        .hudIconButton:hover,
        .hudIconButton:focus-visible {
            color: rgba(255,255,255,0.96);
            outline: none;
        }

        .hudIconButton svg {
            width: 22px;
            height: 22px;
            display: block;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter:
                drop-shadow(0 0 1px var(--bg-bottom))
                drop-shadow(0 0 6px var(--bg-bottom));
        }

        #muteToggle {
            top: calc(var(--safe-top) + 24px);
            right: calc(var(--safe-right) + 24px);
        }

        #muteToggle .icon-muted {
            display: none;
        }

        #muteToggle[aria-pressed="true"] .icon-on {
            display: none;
        }

        #muteToggle[aria-pressed="true"] .icon-muted {
            display: block;
        }

    </style>
</head>
<body>

    <div id="safeAreaProbe" aria-hidden="true"></div>
    <div id="gameArea">
        <div id="levelIndicator">1</div>
        <div id="achievementSummary" aria-live="polite"></div>
        <div id="playfieldTint" aria-hidden="true"></div>
        <div id="outsideGlow" aria-hidden="true"></div>
        <div id="edgeGlow" aria-hidden="true">
            <div class="edgeGlowSide edgeGlowTop"></div>
            <div class="edgeGlowSide edgeGlowRight"></div>
            <div class="edgeGlowSide edgeGlowBottom"></div>
            <div class="edgeGlowSide edgeGlowLeft"></div>
        </div>
        <div id="playfieldBorder" aria-hidden="true"></div>
        <div id="edgeThreatOverlay" aria-hidden="true">
            <div class="edgeThreatCutout edgeThreatTop"></div>
            <div class="edgeThreatCutout edgeThreatRight"></div>
            <div class="edgeThreatCutout edgeThreatBottom"></div>
            <div class="edgeThreatCutout edgeThreatLeft"></div>
        </div>
        <div id="trailContainer" aria-hidden="true"></div>
        <div id="particleContainer" aria-hidden="true"></div>
        <div id="dominoContainer"></div>
        <div id="ball"></div>
        <div id="ballCallout" aria-hidden="true"></div>
        <div id="mouseOriginLine" aria-hidden="true"></div>
        <div id="mouseOriginCrosshair" aria-hidden="true"></div>
        <div id="pauseOverlay" aria-hidden="true">
            <span class="pauseBar"></span>
            <span class="pauseBar"></span>
        </div>
        <div id="transitionFlash" aria-hidden="true"></div>
    </div>

    <div id="introText">lightly tilt phone to knock all blocks<br>but don't fall off the board</div>
    <div id="bestScoreDisplay">Best: 0</div>
    <div id="restartText">tap anywhere to start</div>
    <div id="desktopQrPanel" aria-hidden="true">
        <a id="desktopQrCard" href="https://tiagosimoes.github.io/tiltbump/" target="_blank" rel="noopener noreferrer">
            <img id="desktopQrImage" alt="QR code for the mobile version">
            <div id="desktopQrCaption">scan to play on your phone</div>
        </a>
    </div>

        function hexToRgb(hex) {
            if (typeof hex !== 'string') return { r: 244, g: 197, b: 66 };
            const normalized = hex.trim().replace('#', '');
            if (!/^[0-9a-fA-F]{6}$/.test(normalized)) return { r: 244, g: 197, b: 66 };
            return {
                r: parseInt(normalized.slice(0, 2), 16),
                g: parseInt(normalized.slice(2, 4), 16),
                b: parseInt(normalized.slice(4, 6), 16)
            };
        }

        function hexToRgba(hex, alpha) {
            const { r, g, b } = hexToRgb(hex);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        let audioCtx, rollOsc, rollGain, shrinkWarnOsc, shrinkWarnGain;
        function initAudio() {
            if (audioCtx) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            rollOsc = audioCtx.createOscillator();
            rollGain = audioCtx.createGain();
            shrinkWarnOsc = audioCtx.createOscillator();
            shrinkWarnGain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            const shrinkWarnFilter = audioCtx.createBiquadFilter();
            rollOsc.type = 'triangle';
            rollOsc.frequency.value = 30;
            filter.type = 'lowpass';
            filter.frequency.value = 150;
            rollGain.gain.value = 0;
            shrinkWarnOsc.type = 'triangle';
            shrinkWarnOsc.frequency.value = 420;
            shrinkWarnFilter.type = 'bandpass';
            shrinkWarnFilter.frequency.value = 340;
            shrinkWarnFilter.Q.value = 1.2;
            shrinkWarnGain.gain.value = 0;
            rollOsc.connect(filter);
            filter.connect(rollGain);
            rollGain.connect(audioCtx.destination);
            shrinkWarnOsc.connect(shrinkWarnFilter);
            shrinkWarnFilter.connect(shrinkWarnGain);
            shrinkWarnGain.connect(audioCtx.destination);
            rollOsc.start();
            shrinkWarnOsc.start();
        }

        function playSound(freq, vol, dur, type = 'sine') {
            if (!audioCtx || isMuted) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + dur);
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playShrinkTick(volume = 0.016, duration = 0.075, frequency = 420) {
            if (!audioCtx || isMuted) return;

            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const filter = audioCtx.createBiquadFilter();
            const gainNode = audioCtx.createGain();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(frequency, now);
            osc.frequency.exponentialRampToValueAtTime(Math.max(140, frequency * 0.48), now + duration);

            const bounds = getPlayfieldBounds(now);

            const cornerRadius = getPlayfieldCornerRadius(frameWidth, frameHeight);

            if (cornerRadius <= 0) {
                return px >= bounds.left && px <= bounds.right && py >= bounds.top && py <= bounds.bottom;
            }

            const innerLeft = bounds.left + cornerRadius;
            const innerRight = bounds.right - cornerRadius;
            const innerTop = bounds.top + cornerRadius;
            const innerBottom = bounds.bottom - cornerRadius;

            if (px >= innerLeft && px <= innerRight && py >= bounds.top && py <= bounds.bottom) {
                return true;
            }

            if (py >= innerTop && py <= innerBottom && px >= bounds.left && px <= bounds.right) {
                return true;
            }

            const cornerX = px < innerLeft ? innerLeft : innerRight;
            const cornerY = py < innerTop ? innerTop : innerBottom;
            return Math.hypot(px - cornerX, py - cornerY) <= cornerRadius;
